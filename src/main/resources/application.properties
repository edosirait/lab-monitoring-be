# buat prod
spring.application.name=lab-monitoring

# =========================================================================
# ? PORT SERVER DINAMIS (PENTING UNTUK CLOUD HOSTING)
# =========================================================================
# Platform seperti Render/Railway menetapkan port secara dinamis lewat variabel PORT.
# Jika variabel PORT tidak ditemukan, aplikasi akan otomatis menggunakan port default 8080.
server.port=${PORT:8080}

# =========================================================================
# ? KONEKSI DATABASE CLOUD SUPABASE (PRODUCTION - AMAN)
# =========================================================================
# Jangan menaruh credential langsung di sini agar tidak bocor di GitHub.
# Nilai di bawah ini akan ditarik dari Environment Variables di platform hosting Anda.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ? Optimasi Hikari Pooler Supabase yang sudah terbukti sukses dan stabil kemarin
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.datasource.hikari.data-source-properties.prepareThreshold=0

# =========================================================================
# ?? PENGATURAN HIBERNATE / JPA (PRODUCTION)
# =========================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ?? UBAH MENJADI 'none' UNTUK PRODUCTION!
# Sangat krusial karena kita sudah memindahkan skema secara matang menggunakan pg_dump.
# Jika tetap 'update', Hibernate akan memicu error konflik tipe Enum PostgreSQL yang kemarin.
spring.jpa.hibernate.ddl-auto=none

# Matikan pencetakan log SQL mentah ke konsol produksi.
# Ini berguna untuk meningkatkan performa aplikasi dan mencegah kebocoran data sensitif di log server.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
